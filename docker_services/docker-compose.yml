services:
  # Serveur LLM
  llm-server:
    image: ubuntu:24.04
    container_name: llm-server
    ports:
      - "8000:8000"
    volumes:
      - ./qwen/vllm.py:/app/qwen/vllm.py
      - llm-models:/root/.cache/huggingface
    working_dir: /app
    command: >
      bash -c "
      apt-get update && 
      apt-get install -y python3 python3-pip &&
      pip3 install --break-system-packages fastapi uvicorn transformers torch &&
      python3 qwen/vllm.py
      "
    networks:
      - llm-network
    restart: unless-stopped

  # n8n
  n8n:
    image: n8nio/n8n
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - N8N_USER_FOLDER=/home/node/.n8n
      # Configuration simplifiée
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_VERSION_NOTIFICATIONS_ENABLED=false
    volumes:
      - n8n-data:/home/node/.n8n
      - ./n8n/data_tables:/home/node/.n8n/data_tables
      - ./n8n/workflows:/home/node/workflows:ro
    networks:
      - llm-network
    depends_on:
      - llm-server
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --spider -q http://localhost:5678/healthz || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # Service d'initialisation n8n (import workflows via CLI)
  n8n-init:
    image: n8nio/n8n
    container_name: n8n-init
    volumes:
      - n8n-data:/home/node/.n8n
      - ./n8n/workflows:/home/node/workflows:ro
      - ./n8n/entities:/home/node/entities:ro
    environment:
      - N8N_USER_FOLDER=/home/node/.n8n
    networks:
      - llm-network
    depends_on:
      n8n:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "=== Initialisation n8n ==="

        # Import des entities (data tables, etc.) si le dossier existe et contient des fichiers
        if [ -d "/home/node/entities" ] && [ "$$(ls -A /home/node/entities 2>/dev/null)" ]; then
          echo "Import des entities (data tables, etc.)..."
          n8n import:entities --inputDir=/home/node/entities || echo "Entities peut-être déjà importées"
        fi

        # Import des workflows
        echo "Import des workflows..."
        for workflow in /home/node/workflows/*.json; do
          if [ -f "$$workflow" ]; then
            filename=$$(basename "$$workflow")
            echo "Import du workflow: $$filename"
            n8n import:workflow --input="$$workflow" || echo "Workflow peut-être déjà existant"
          fi
        done

        echo "=== Initialisation terminée ==="
        echo ""
        echo "NOTE: Pour importer des data tables, exportez-les d'abord depuis une instance n8n:"
        echo "  docker exec n8n n8n export:entities --outputDir=/tmp/export"
        echo "  Puis copiez le contenu dans ./n8n/entities/"
    restart: "no"

  # Base de données PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=bluesky
      - POSTGRES_PASSWORD=bluesky_secret
      - POSTGRES_DB=bluesky_ai
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - llm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bluesky -d bluesky_ai"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  llm-network:
    driver: bridge

volumes:
  llm-models:
  n8n-data:
  postgres-data:
