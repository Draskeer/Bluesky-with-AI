services:
  # Serveur LLM
  llm-server:
    image: ubuntu:24.04
    container_name: llm-server
    ports:
      - "8000:8000"
    volumes:
      - ./qwen/vllm.py:/app/qwen/vllm.py
      - llm-models:/root/.cache/huggingface
    working_dir: /app
    command: >
      bash -c "
      apt-get update &&
      apt-get install -y python3 python3-pip &&
      pip3 install --break-system-packages torch --index-url https://download.pytorch.org/whl/cpu &&
      pip3 install --break-system-packages fastapi uvicorn transformers numpy &&
      python3 qwen/vllm.py
      "
    networks:
      - llm-network
    restart: unless-stopped

  # Classifier BERT (sentiment + fact-check NLI + topic zero-shot, CPU, inférence seule)
  classifier:
    image: python:3.11-slim
    container_name: classifier
    ports:
      - "8002:8002"
    volumes:
      - ./classifier:/app
      - llm-models:/root/.cache/huggingface
    working_dir: /app
    environment:
      - PORT=8002
      - TORCH_THREADS=2
      # Seuils NLI resserrés pour éviter les faux positifs (entailment partiel sur contexte)
      - ENTAIL_SOFT=0.65   # était 0.50 — un article "soutient" le claim seulement si entailment fort
      - CORRO_MIN=4        # était 3 — il faut 4 sources concordantes pour conclure "real"
      - NLI_HI=0.75        # était 0.70 — seuil pour trancher fake/real
      - ENABLE_LLM_ESCALATION=true
    command: >
      sh -c "
      pip install --no-cache-dir torch --index-url https://download.pytorch.org/whl/cpu &&
      pip install --no-cache-dir -r requirements.txt &&
      python server.py
      "
    networks:
      - llm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8002/health').status==200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 180s

  # n8n
  n8n:
    image: n8nio/n8n
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - N8N_USER_FOLDER=/home/node/.n8n
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_VERSION_NOTIFICATIONS_ENABLED=false
      # Compte owner cree automatiquement au demarrage via init-wrapper.sh
      - N8N_OWNER_EMAIL=${N8N_OWNER_EMAIL}
      - N8N_OWNER_PASSWORD=${N8N_OWNER_PASSWORD}
      - N8N_OWNER_FIRSTNAME=${N8N_OWNER_FIRSTNAME:-Admin}
      - N8N_OWNER_LASTNAME=${N8N_OWNER_LASTNAME:-User}
    volumes:
      - n8n-data:/home/node/.n8n
      - ./n8n/data_tables:/home/node/.n8n/data_tables
      - ./n8n/workflows:/home/node/workflows:ro
      - ./n8n/provisioning:/home/node/provisioning:ro
      - ./n8n/init-wrapper.sh:/home/node/init-wrapper.sh:ro
    networks:
      - llm-network
    depends_on:
      - llm-server
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/home/node/init-wrapper.sh"]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --spider -q http://localhost:5678/healthz || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # Service d'initialisation n8n (import workflows via CLI)
  n8n-init:
    image: n8nio/n8n
    container_name: n8n-init
    env_file:
      - .env
    volumes:
      - n8n-data:/home/node/.n8n
      - ./n8n/workflows:/home/node/workflows:ro
      - ./n8n/provisioning:/home/node/provisioning:ro
    environment:
      - N8N_USER_FOLDER=/home/node/.n8n
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      # Credentials provisionnées automatiquement
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_DB=bluesky_ai
      - PG_USER=bluesky
      - PG_PASSWORD=bluesky_secret
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_API_KEY=${QDRANT_API_KEY}
      - LLM_BASE_URL=http://llm-server:8000/v1
    networks:
      - llm-network
    depends_on:
      n8n:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "sh /home/node/provisioning/provision.sh"
    restart: "no"

  # Base de données PostgreSQL pour n8n
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=bluesky
      - POSTGRES_PASSWORD=bluesky_secret
      - POSTGRES_DB=bluesky_ai
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - llm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bluesky -d bluesky_ai"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY}
    networks:
      - llm-network
    restart: unless-stopped

  # Initialisation Qdrant (création collection + index)
  qdrant-init:
    image: curlimages/curl:8.6.0
    container_name: qdrant-init
    volumes:
      - ./qwen/init.sh:/app/qwen/init.sh:ro
    environment:
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_API_KEY=${QDRANT_API_KEY}
    networks:
      - llm-network
    depends_on:
      - qdrant
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Waiting for Qdrant..."
        until curl -sS http://qdrant:6333/healthz >/dev/null; do sleep 1; done
        /app/qwen/init.sh
    restart: "no"

  # Base de données PostgreSQL pour le stockage des données traités
  postgres-data:
    image: timescale/timescaledb:latest-pg16
    container_name: db_bluesky_data
    restart: always
    environment:
      - POSTGRES_USER=bluesky
      - POSTGRES_PASSWORD=bluesky_secret
      - POSTGRES_DB=bluesky_data
    ports:
      - "5433:5432"
    volumes:
      - postgres-bluesky-data:/var/lib/postgresql/data
      # On monte spécifiquement le fichier init_bluesky.sql
      - ./postgres/init/init_bluesky.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - llm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bluesky -d bluesky_data"]
      interval: 10s
      timeout: 5s
      retries: 5

  # News Getter - Service pour récupérer et indexer les articles
  news_getter:
    build: ./news_getter
    container_name: news_getter
    env_file:
      - .env
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      EMBED_API_PORT: "8001"
      # INTERVAL_MINUTES: "150"  # 2.5h by default, override if needed
    ports:
      - "8001:8001"
    volumes:
      - news_data:/data
    depends_on:
      - qdrant
    networks:
      - llm-network
    restart: unless-stopped

  # Interface d'administration web pour PostgreSQL
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@bluesky.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "5050:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - llm-network
    depends_on:
      - postgres
      - postgres-data
    restart: unless-stopped

networks:
  llm-network:
    driver: bridge

volumes:
  llm-models:
  n8n-data:
  postgres-data:
  qdrant_data:
  postgres-bluesky-data:
  news_data:
  pgadmin-data: